<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* =========================
   🔥 FIREBASE CONFIG
========================= */
const firebaseConfig = {
  databaseURL: "https://bravicontrol-89aec-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* =========================
   🔄 VARIABLES GLOBALES
========================= */
let INVENTARIO = [];
let PRODUCTOS = [];
let VENTAS = [];

/* =========================
   🔥 ESCUCHAR CAMBIOS EN TIEMPO REAL
========================= */
db.ref("bravicontrol/data").on("value", (snap) => {
  const data = snap.val();
  if (!data) return;

  console.log("🔥 Sync en vivo:", data);

  INVENTARIO = data.inventario || [];
  PRODUCTOS = data.productos || [];
  VENTAS = data.ventas || [];

  renderAll();
});

/* =========================
   🧠 RENDER PRINCIPAL
========================= */
function renderAll() {
  renderInventario();
  renderProductos();
  renderVentas();
}

/* =========================
   📦 INVENTARIO
========================= */
function renderInventario() {
  console.log("Inventario actualizado:", INVENTARIO);

  // 👉 aquí llamas tu tabla actual
  if (typeof drawInventario === "function") {
    drawInventario(INVENTARIO);
  }
}

/* =========================
   🧁 PRODUCTOS
========================= */
function renderProductos() {
  if (typeof drawProductos === "function") {
    drawProductos(PRODUCTOS);
  }
}

/* =========================
   🛒 VENTAS
========================= */
function renderVentas() {
  if (typeof drawVentas === "function") {
    drawVentas(VENTAS);
  }
}

/* =========================
   ✅ GUARDAR MOVIMIENTO (EJEMPLO)
========================= */
async function guardarMovimiento(data) {
  const ref = db.ref("bravicontrol/movimientos").push();

  await ref.set({
    ...data,
    fecha: new Date().toISOString()
  });

  alert("✅ Guardado correctamente");
}

/* =========================
   🧹 LIMPIAR VENTAS AUTOMÁTICO
========================= */
function limpiarVentas() {
  document.querySelectorAll("input[type='number']").forEach(i => i.value = 0);
}

/* =========================
   🔥 EJEMPLO REGISTRAR VENTA
========================= */
async function registrarVentas(data) {
  const ref = db.ref("bravicontrol/ventas").push();

  await ref.set(data);

  limpiarVentas(); // 🔥 IMPORTANTE
}

/* =========================
   🧪 DEBUG (OPCIONAL)
========================= */
window.testFirebase = () => {
  db.ref("test").set({ ok: true });
  console.log("🔥 Firebase conectado");
};
</script>
