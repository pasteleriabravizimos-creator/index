<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BraviControl</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #fff;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e293b;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #334155;
      color: #38bdf8;
    }

    tr:hover {
      background: #1e293b;
    }

    .ok {
      color: #22c55e;
    }

    .bajo {
      color: #ef4444;
    }
  </style>
</head>

<body>

<h1>🔥 Inventario BraviControl (Tiempo Real)</h1>

<table id="tabla">
  <thead>
    <tr>
      <th>Producto</th>
      <th>Unidad</th>
      <th>Precio</th>
      <th>Stock</th>
      <th>Estado</th>
      <th>Valor</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const firebaseConfig = {
  databaseURL: "https://bravicontrol-89aec-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 TIEMPO REAL */
db.ref("bravicontrol/data").on("value", (snap) => {
  const data = snap.val();

  if (!data) return;

  renderInventario(data.inventario || []);
});

/* 🔥 RENDER INVENTARIO */
function renderInventario(lista) {
  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  // ❌ saltar primeras filas basura (encabezados)
  const datos = lista.slice(2);

  datos.forEach(item => {
    const tr = document.createElement("tr");

    const estado = item.col_8 === "BAJO" ? "bajo" : "ok";

    tr.innerHTML = `
      <td>${item.inventario_de_insumos__bravizimos || "-"}</td>
      <td>${item.col_1 || "-"}</td>
      <td>S/ ${item.col_2 || 0}</td>
      <td>${item.col_3 || 0}</td>
      <td class="${estado}">${item.col_8 || "-"}</td>
      <td>S/ ${item.col_9 || 0}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
