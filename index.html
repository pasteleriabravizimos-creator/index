<script>
// ===============================
// 🔥 CONFIG FIREBASE
// ===============================
const firebaseConfig = {
  databaseURL: "https://bravicontrol-89aec-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===============================
// 🔥 DATA GLOBAL
// ===============================
let DATA = {
  inventario: [],
  productos: [],
  ventas: []
};

// ===============================
// 🔥 ESCUCHAR FIREBASE REALTIME
// ===============================
db.ref("bravicontrol/data").on("value", (snap) => {
  const data = snap.val();

  if (!data) {
    console.log("⚠️ Firebase vacío");
    return;
  }

  console.log("🔥 DATA:", data);

  // Guardamos todo
  DATA = data;

  // Inicializar sistema
  cargarSistema();
});

// ===============================
// 🚀 INICIALIZAR APP
// ===============================
function cargarSistema() {
  console.log("🚀 Sistema cargado desde Firebase");

  try {
    renderDashboard();
    renderInventario();
    renderProductos();
  } catch (e) {
    console.log("⚠️ Esperando funciones...");
  }
}

// ===============================
// 📊 DASHBOARD
// ===============================
function renderDashboard() {
  if (!DATA.ventas) return;

  const totalVentas = DATA.ventas.length;

  document.getElementById("content").innerHTML = `
    <h2>📊 Dashboard</h2>
    <p>Total ventas: ${totalVentas}</p>
  `;
}

// ===============================
// 📦 INVENTARIO
// ===============================
function renderInventario() {
  if (!DATA.inventario) return;

  let html = `
    <h2>📦 Inventario</h2>
    <table border="1" cellpadding="5">
      <tr>
        <th>Insumo</th>
        <th>Stock</th>
      </tr>
  `;

  DATA.inventario.forEach(item => {
    const nombre = item.insumo || item.nombre || "-";
    const stock = item.stock || "-";

    html += `
      <tr>
        <td>${nombre}</td>
        <td>${stock}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("content").innerHTML = html;
}

// ===============================
// 🧁 PRODUCTOS
// ===============================
function renderProductos() {
  if (!DATA.productos) return;

  let html = `
    <h2>🧁 Productos</h2>
    <table border="1" cellpadding="5">
      <tr>
        <th>Nombre</th>
        <th>Precio</th>
      </tr>
  `;

  DATA.productos.forEach(p => {
    html += `
      <tr>
        <td>${p.nombre}</td>
        <td>S/ ${p.precio_venta || 0}</td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("content").innerHTML = html;
}

// ===============================
// 🔄 NAVEGACIÓN
// ===============================
function nav(_, vista) {
  if (vista === "dashboard") renderDashboard();
  if (vista === "inventario") renderInventario();
  if (vista === "productos") renderProductos();
}

// ===============================
// 📅 FECHA
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  const fecha = new Date().toLocaleString();
  const el = document.getElementById("fecha");
  if (el) el.textContent = fecha;
});
</script>
